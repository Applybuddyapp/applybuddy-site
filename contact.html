<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ApplyBuddy</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 40px auto; padding: 20px; }
        h1 { color: #2563eb; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #1d4ed8; }
        .footer { margin-top: 30px; font-size: 0.9em; color: #666; text-align: center; }
    </style>
</head>
<body>
    <h1>Get in Touch 📩</h1>
    <p>Need help with ApplyBuddy? Have a feature request? We'd love to hear from you.</p>

    <form action="https://formspree.io/f/your-form-id" method="POST">
        <div class="form-group">
            <label>Your Email</label>
            <input type="email" name="email" required placeholder="email@example.com">
        </div>
        <div class="form-group">
            <label>How can we help?</label>
            <textarea name="message" rows="5" required placeholder="Describe your issue or suggestion..."></textarea>
        </div>
        <button type="submit">Send Message</button>
    </form>

    <div class="footer">
        <p>&copy; 2026 ApplyBuddy. Based in Lahore, Pakistan.</p>
    </div>
</body>
</html>
