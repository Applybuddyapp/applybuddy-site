<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ApplyBuddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="sticky top-0 z-50 glass-effect border-b border-slate-200 py-4 px-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold text-sm">A</div>
                <span class="text-lg font-bold tracking-tight text-slate-900">ApplyBuddy <span class="text-blue-600">AI</span></span>
            </div>
            <a href="index.html" class="text-sm text-slate-500 hover:text-blue-600 font-medium transition-colors">Back to Home</a>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-16">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Get in Touch 📩</h1>
            <p class="text-slate-600">Need help with ApplyBuddy or have a feature request? We'd love to hear from you.</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
            <form action="https://formspree.io/f/mnjokbpe" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Your Email</label>
                    <input type="email" name="email" required 
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                        placeholder="email@example.com">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">How can we help?</label>
                    <textarea name="message" rows="5" required 
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                        placeholder="Describe your issue or suggestion..."></textarea>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-[0.98]">
                    Send Message
                </button>
            </form>
        </div>

        <div class="mt-12 text-center text-slate-400 text-sm">
            <p>&copy; 2026 ApplyBuddy. Built with pride in Lahore, Pakistan.</p>
        </div>
    </main>

</body>
</html>
